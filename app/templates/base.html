<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hoops Dynasty Analytics</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7f9; color: #1d2733; }
    header { background: #111827; color: white; padding: 18px 28px; }
    header a { color: white; text-decoration: none; margin-right: 18px; }
    main { padding: 28px; max-width: 1200px; margin: auto; }
    .card { background: white; border-radius: 14px; box-shadow: 0 3px 14px rgba(0,0,0,.08); padding: 20px; margin-bottom: 22px; }
    input[type=text] { width: 75%; padding: 12px; border: 1px solid #ccd2da; border-radius: 8px; font-size: 15px; }
    button { padding: 12px 16px; border: 0; background: #2563eb; color: white; border-radius: 8px; font-weight: 700; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px 10px; text-align: left; }
    th { background: #f3f4f6; }
    .muted { color: #64748b; }
    .pill { display: inline-block; padding: 3px 8px; background: #eef2ff; border-radius: 99px; font-size: 12px; }
  </style>
</head>
<body>
<header>
  <a href="/"><strong>Hoops Dynasty Analytics</strong></a>
  <a href="/players">Players</a>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
